[build]
builder = "nixpacks"

[deploy]
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3

[[services]]
name = "backend"
source = "backend"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[services.variables]
PORT = "8000"

[services.healthcheck]
path = "/health"
interval = 30
timeout = 10
retries = 3

[[services]]
name = "frontend"
source = "frontend"
